# CRSEM Model Parameter Configuration
# This file defines default parameter values, bounds, and penalty settings
# If not provided, the code will use built-in defaults

model_type: crsem

# Default parameter values for initialization
defaults:
  # R-factor parameters
  a_rain: 0.5
  r_th: 1
  a_melt: 0.1
  m_th: 0
  k_melt: 3.0

  # K-factor parameters
  alpha_K: 0.35
  K_min_r: 0.7
  K_max_r: 1.5

  # C-factor parameters
  alpha_C: 2

  # SDR parameters
  ic0: 0.5
  k: 2.5
  beta_sdr: 0.5

  # Channel erosion parameters
  c_base: 0.1
  n_chan: 1.8
  K_chan: 0.5

# Parameter bounds for optimization (min, max)
bounds:
  a_rain: [0.5, 1.0]
  r_th: [1, 20]
  a_melt: [0.1, 1.0]
  m_th: [0, 10]
  k_melt: [1.0, 5.0]
  alpha_K: [0.1, 0.8]
  K_min_r: [0.4, 1.0]
  K_max_r: [1.0, 2.0]
  alpha_C: [1.0, 5.0]
  ic0: [0.1, 1.0]
  k: [0.5, 4.0]
  beta_sdr: [0.3, 1.0]
  c_base: [0.1, 20.0]
  n_chan: [1.0, 2.0]
  K_chan: [0.1, 1.0]

# Penalty settings for calibration
penalties:
  channel_ratio:
    enabled: true
    lower_bound: -0.6
    upper_bound: 0.3

  annual_r_factor:
    enabled: true
    lower_normal: 100.0
    upper_normal: 200.0
