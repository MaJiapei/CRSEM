# RUSLE Model Parameter Configuration
# This file defines default parameter values, bounds, and penalty settings

model_type: rusle

# Default parameter values for initialization
defaults:
  a_rain: 0.05
  b_rain: 2.0
  c_base: 0.1
  n_chan: 1.5
  K_chan: 0.5
  ic0: 0.5
  k: 2.5

# Parameter bounds for optimization (min, max)
bounds:
  a_rain: [0.001, 0.1]
  b_rain: [1.0, 3.0]
  c_base: [0.1, 20.0]
  n_chan: [1.0, 2.0]
  K_chan: [0.1, 1.0]
  ic0: [0.1, 1.0]
  k: [0.5, 4.0]

# Penalty settings for calibration
penalties:
  channel_ratio:
    enabled: true
    lower_bound: -0.6
    upper_bound: 0.3
